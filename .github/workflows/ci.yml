name: C++ CI

on:
  push:
  pull_request:

jobs:
  build-cpp:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
    - uses: actions/checkout@v4

    - name: Set up latest CMake
      uses: jwlawson/actions-setup-cmake@v2.0
      with:
        cmake-version: '3.25.x'

    - name: Install System Dependencies (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y zlib1g-dev libssl-dev libbz2-dev wget

    - name: Download Precompiled OR-Tools (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        wget -qO ortools.tar.gz https://github.com/google/or-tools/releases/download/v9.15/or-tools_amd64_ubuntu-24.04_cpp_v9.15.6755.tar.gz
        tar -xzf ortools.tar.gz
        mv or-tools_x86_64_Ubuntu-24.04_cpp_v9.15.6755 ortools-lib

    - name: Download Precompiled OR-Tools (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        Invoke-WebRequest -Uri "https://github.com/google/or-tools/releases/download/v9.15/or-tools_x64_VisualStudio2022_cpp_v9.15.6755.zip" -OutFile "ortools.zip"
        Expand-Archive -Path "ortools.zip" -DestinationPath "."
        Rename-Item -Path "or-tools_x64_VisualStudio2022_cpp_v9.15.6755" -NewName "ortools-lib"
        echo "${{ github.workspace }}\ortools-lib\bin" >> $env:GITHUB_PATH
        echo "${{ github.workspace }}\ortools-lib\lib" >> $env:GITHUB_PATH

    - name: Configure CMake
      run: >
        cmake -B build
        -DCMAKE_BUILD_TYPE=Release
        -DFETCHCONTENT_QUIET=OFF
        -DCMAKE_PREFIX_PATH="${{ github.workspace }}/ortools-lib"
        -Dortools_DIR="${{ github.workspace }}/ortools-lib/lib/cmake/ortools"

    - name: Build Library and Bindings
      run: cmake --build build --config Release -j 4

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: compiled-build-${{ matrix.os }}
        path: |
          build/
          ortools-lib/
        retention-days: 1

  test-cpp:
    needs: build-cpp
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
    - uses: actions/checkout@v4
    
    - name: Download Build Artifacts
      uses: actions/download-artifact@v4
      with:
        name: compiled-build-${{ matrix.os }}

    - name: Run C++ GoogleTests (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        chmod +x build/alpha_expansion_tests
        cd build
        ctest --output-on-failure

    - name: Run C++ GoogleTests (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        # Prepend OR-Tools to PATH for DLL resolution (prevents conflicts with system DLLs)
        $env:PATH = "${{ github.workspace }}\ortools-lib\bin;${{ github.workspace }}\ortools-lib\lib;" + $env:PATH
        cd build
        ctest -C Release --output-on-failure

  test-python:
    needs: build-cpp
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install System Dependencies (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: sudo apt-get install -y libegl1

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Download Build Artifacts
      uses: actions/download-artifact@v4
      with:
        name: compiled-build-${{ matrix.os }}

    - name: Fix Windows Python Path & DLLs
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        Copy-Item -Path "build\Release\*.pyd" -Destination "build\" -Force
        # Python 3.8+ on Windows ignores PATH for DLLs. We must copy them next to the .pyd.
        Copy-Item -Path "${{ github.workspace }}\ortools-lib\bin\*.dll" -Destination "build\" -Force -ErrorAction SilentlyContinue
        Copy-Item -Path "${{ github.workspace }}\ortools-lib\lib\*.dll" -Destination "build\" -Force -ErrorAction SilentlyContinue

    - name: Run pytest
      run: python -m pytest tests/ -v

    - name: Run community detection (bk, sequential)
      run: |
        cd scripts
        python run_community.py --datasets karate,lesmis --solver bk --strategy sequential --init zero

    - name: Run community detection (bk, greedy)
      run: |
        cd scripts
        python run_community.py --datasets karate,lesmis --solver bk --strategy greedy --init zero

    - name: Run community detection (bk, randomized)
      run: |
        cd scripts
        python run_community.py --datasets karate,lesmis --solver bk --strategy randomized --init zero

    - name: Run community detection (ortools, sequential)
      run: |
        cd scripts
        python run_community.py --datasets karate,lesmis --solver ortools --strategy sequential --init zero

    - name: Run Middlebury benchmark (bk, sequential)
      run: |
        cd scripts
        python run_middlebury.py --solver bk --strategy sequential

    - name: Run Middlebury benchmark (ortools, sequential)
      run: |
        cd scripts
        python run_middlebury.py --solver ortools --strategy sequential
