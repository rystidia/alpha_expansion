name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag (e.g. v0.1.0)'
        required: true
        type: string
      publish:
        description: 'Publish to GitHub Releases (false = build + smoke-test only, download from workflow artifacts)'
        required: true
        type: boolean
        default: false

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
    - uses: actions/checkout@v4

    - uses: jwlawson/actions-setup-cmake@v2
      with:
        cmake-version: '3.25.x'

    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Compute package name
      id: pkg
      shell: bash
      run: |
        if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
          os_suffix="linux"
        else
          os_suffix="windows"
        fi
        echo "name=alpha_expansion-${{ inputs.version }}-${os_suffix}" >> "$GITHUB_OUTPUT"

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DUSE_OR_TOOLS=OFF

    - name: Build static library
      run: cmake --build build --config Release --target graph_cuts -j 4

    - name: Install to package directory
      shell: bash
      run: |
        PKG="${{ steps.pkg.outputs.name }}"
        cmake --install build --config Release --prefix "$PKG"
        cp README.md "$PKG/"

    - name: Zip package (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: zip -r "${{ steps.pkg.outputs.name }}.zip" "${{ steps.pkg.outputs.name }}"

    - name: Zip package (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: Compress-Archive -Path "${{ steps.pkg.outputs.name }}" -DestinationPath "${{ steps.pkg.outputs.name }}.zip" -Force

    - name: Smoke test (find_package against installed package)
      shell: bash
      run: |
        PKG="${{ steps.pkg.outputs.name }}"
        WORK="$RUNNER_TEMP/cpp-smoke"
        rm -rf "$WORK" && mkdir -p "$WORK"
        unzip -q "$PKG.zip" -d "$WORK"
        cat > "$WORK/smoke.cpp" <<'CPP'
        #include "bk_maxflow_impl/graph.h"
        #include <cstdio>
        int main() {
            Graph<int,int,int> g(2, 1);
            g.add_node(2);
            std::printf("graph_cuts OK\n");
            return 0;
        }
        CPP
        cat > "$WORK/CMakeLists.txt" <<'CM'
        cmake_minimum_required(VERSION 3.14)
        project(smoke CXX)
        set(CMAKE_CXX_STANDARD 17)
        find_package(alpha_expansion REQUIRED)
        add_executable(smoke smoke.cpp)
        target_link_libraries(smoke PRIVATE alpha_expansion::graph_cuts)
        CM
        cmake -S "$WORK" -B "$WORK/build" -DCMAKE_PREFIX_PATH="$WORK/$PKG"
        cmake --build "$WORK/build" --config Release
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          "$WORK/build/Release/smoke.exe"
        else
          "$WORK/build/smoke"
        fi

    - name: Upload package
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.pkg.outputs.name }}
        path: ${{ steps.pkg.outputs.name }}.zip
        if-no-files-found: error

  build-sdist:
    name: python sdist
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install build tools
      run: python -m pip install build

    - name: Build sdist
      run: python -m build --sdist

    - name: Smoke test (install sdist into fresh venv and import)
      run: |
        python -m venv /tmp/sdist-smoke
        /tmp/sdist-smoke/bin/python -m pip install --upgrade pip
        /tmp/sdist-smoke/bin/python -m pip install dist/*.tar.gz
        /tmp/sdist-smoke/bin/python -c "import alpha_expansion_py as ae; m = ae.EnergyModel(4, 2, 'int32'); print('sdist install OK:', m)"

    - name: Upload sdist
      uses: actions/upload-artifact@v4
      with:
        name: alpha_expansion-${{ inputs.version }}-sdist
        path: dist/*.tar.gz
        if-no-files-found: error

  release:
    name: Create draft release
    needs: [build, build-sdist]
    if: ${{ inputs.publish }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download all packages
      uses: actions/download-artifact@v4
      with:
        path: dist
        pattern: alpha_expansion-*
        merge-multiple: true

    - name: Create draft release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ inputs.version }}
        name: ${{ inputs.version }}
        draft: true
        files: |
          dist/*.zip
          dist/*.tar.gz
